<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}边缘安全审计工具{% endblock %}</title>

    <!-- 本地Bootstrap CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/bootstrap.min.css') }}">

    <style>
        body {
            background-color: #f5f5f5;
            padding-bottom: 40px;
        }

        .navbar {
            background-color: #343a40;
            margin-bottom: 20px;
        }

        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }

        .nav-link {
            color: #rgba(255,255,255,.8) !important;
        }

        .nav-link:hover {
            color: #fff !important;
        }

        .nav-link.active {
            color: #fff !important;
            background-color: rgba(255,255,255,.1);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .card {
            margin-bottom: 20px;
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }

        .card-header {
            background-color: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            font-weight: 600;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-up {
            background-color: #d4edda;
            color: #155724;
        }

        .status-down {
            background-color: #f8d7da;
            color: #721c24;
        }

        .risk-HIGH {
            background-color: #dc3545;
            color: #fff;
        }

        .risk-MEDIUM {
            background-color: #ffc107;
            color: #000;
        }

        .risk-LOW {
            background-color: #28a745;
            color: #fff;
        }

        .risk-INFO {
            background-color: #6c757d;
            color: #fff;
        }

        footer {
            margin-top: 40px;
            padding: 20px 0;
            text-align: center;
            color: #6c757d;
            border-top: 1px solid #dee2e6;
        }

        /* 表格样式 */
        .table th {
            background-color: #f8f9fa;
            border-top: none;
        }

        /* 按钮样式 */
        .btn {
            cursor: pointer;
        }

        /* 表单样式 */
        .form-control, .form-select {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: text-bottom; margin-right: 8px;">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                边缘安全审计工具
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'index' %} active{% endif %}" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'network' %} active{% endif %}" href="/network">网络发现</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'ports' %} active{% endif %}" href="/ports">端口扫描</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'vulns' %} active{% endif %}" href="/vulns">漏洞扫描</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'traffic' %} active{% endif %}" href="/traffic">流量分析</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'report' %} active{% endif %}" href="/report">审计报告</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text">v{{ version }}</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p class="mb-0">边缘安全审计工具 v{{ version }} | 基于香橙派 Zero 2W</p>
        </div>
    </footer>

    <!-- 本地Bootstrap JS -->
    <script src="{{ url_for('static', filename='vendor/bootstrap.bundle.min.js') }}"></script>

    {% block scripts %}{% endblock %}
</body>
</html>
